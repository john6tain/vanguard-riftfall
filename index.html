<html>
<head>

  <title>Vanguard: Riftfall - Free Browser FPS Game</title>
  <meta name="description" content="Vanguard: Riftfall is a free browser FPS with wave combat, mobile controls, and fast arena action." />
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="Vanguard: Riftfall - Free Browser FPS Game" />
  <meta property="og:description" content="Play Vanguard: Riftfall in your browser. Fast wave shooter with desktop and mobile controls." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vanguard-riftfall.john6tain-tube.workers.dev/" />
  <meta property="og:image" content="https://vanguard-riftfall.john6tain-tube.workers.dev/og-image.png" />
  <link rel="canonical" href="https://vanguard-riftfall.john6tain-tube.workers.dev/" />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1958335778436231" crossorigin="anonymous"></script>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#03060d;color:#dbeafe;font-family:system-ui,Arial}
    #hud{position:fixed;left:12px;top:10px;z-index:5;font-weight:700;text-shadow:0 2px 8px #000}
    #tip{position:fixed;right:12px;top:10px;z-index:5;text-align:right;opacity:.9}
    #center{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;width:8px;height:8px;border:2px solid #9dd6ff;border-radius:999px}
    #msg{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:6;background:#000b;border:1px solid #60a5fa;padding:14px 18px;border-radius:10px;text-align:center}
    button{background:#0b1a33;color:#dbeafe;border:1px solid #3b82f6;padding:8px 12px;border-radius:8px;cursor:pointer}
    #mobile{display:none;position:fixed;inset:0;z-index:7;pointer-events:none}
    body.mobile #mobile{display:block}
    .stick{position:absolute;bottom:18px;width:132px;height:132px;border:2px solid #7dd3fc88;border-radius:999px;background:#0b1a3360;pointer-events:auto;touch-action:none}
    .stick .knob{position:absolute;left:46px;top:46px;width:40px;height:40px;border-radius:999px;background:#bae6fd99}
    #moveStick{left:16px}
    #lookStick{right:16px}
    .mBtn{position:absolute;right:170px;bottom:34px;width:72px;height:72px;border-radius:999px;border:2px solid #fda4afaa;background:#3f102560;color:#fff;font-weight:700;pointer-events:auto;touch-action:none}
    .mBtn2{right:252px;bottom:18px;width:56px;height:56px;border-color:#93c5fdaa;background:#0b254560}
    #ad-interstitial,#ad-rewarded{display:none;position:fixed;inset:0;z-index:20;align-items:center;justify-content:center;background:rgba(0,0,0,.82);font-weight:700}
    #ad-banner{position:fixed;left:50%;transform:translateX(-50%);bottom:6px;z-index:8;background:#0b1220cc;border:1px solid #334155;padding:6px 10px;border-radius:8px;font-size:12px;opacity:.85}
    @media (orientation: portrait){ body.mobile #tip{display:none} }
  </style>
</head>
<body>
  <div id="hud">HP: <span id="hp">100</span> | Shield: <span id="sh">80</span> | Ammo: <span id="am">36</span> | Kills: <span id="ks">0</span> | Score: <span id="sc">0</span> | Stage: <span id="stg">Breach</span> | Enemies left: <span id="stk">0</span></div>
  <div id="tip">WASD move | Mouse look | Click shoot | R reload | Shift sprint</div>
  <div id="center"></div>
  <div id="msg">
    <h2>Vanguard: Riftfall (3D)</h2>
    <p>Choose mode, then deploy.</p>
    <div style="display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin:10px 0">
      <input id="roomInput" value="rift" placeholder="room code" style="padding:7px 10px;border-radius:8px;border:1px solid #3b82f6;background:#081326;color:#dbeafe;min-width:130px" />
      <button id="hostBtn" type="button">Host</button>
      <button id="joinBtn" type="button">Join</button>
      <button id="soloBtn" type="button">Solo</button>
    </div>
    <p id="mpStatus" style="opacity:.9;margin:6px 0 10px">Mode: Solo</p>
    <button id="startBtn">Deploy</button>
  </div>
  <div id="mobile">
    <div id="moveStick" class="stick"><div class="knob" id="moveKnob"></div></div>
    <div id="lookStick" class="stick"><div class="knob" id="lookKnob"></div></div>
    <button id="fireBtn" class="mBtn">FIRE</button>
    <button id="reloadBtn" class="mBtn mBtn2">R</button>
  </div>

  <div id="ad-banner">
    <ins class="adsbygoogle"
      style="display:block"
      data-ad-client="ca-pub-1958335778436231"
      data-ad-slot="7293483574"
      data-ad-format="auto"
      data-adtest="on"
      data-full-width-responsive="true"></ins>
  </div>
  <div id="ad-interstitial">Interstitial Ad (placement test)</div>
  <div id="ad-rewarded">Rewarded Ad...</div>
<script type="importmap">
{

</html>
